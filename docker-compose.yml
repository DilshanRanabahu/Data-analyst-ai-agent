version: '3.8'

services:
  react-frontend:
    build: 
      context: ./react-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - spring-backend
    restart: always
    environment:
      - VITE_API_BASE_URL=http://54.198.22.75:8080

  spring-backend:
    build:
      context: ./spring-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PYTHON_SERVICE_URL=http://python-backend:5000
      - CORS_ORIGINS=http://54.198.22.75
    volumes:
      - ./credentials:/app/credentials
    restart: always

  python-backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/vertex-ai-key.json
    volumes:
      - ./credentials:/app/credentials
    restart: always

  mysql-db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=sales_test_db
      - MYSQL_USER=admin
      - MYSQL_PASSWORD=adminpassword
    volumes:
      - mysql-data:/var/lib/mysql
      - ./test_database_mysql.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always

volumes:
  mysql-data:
