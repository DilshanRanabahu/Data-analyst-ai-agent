version: '3.8'

services:
  react-frontend:
    build: 
      context: ./react-frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - spring-backend
    restart: always
    environment:
      - VITE_API_BASE_URL=http://54.198.22.75:8080

  spring-backend:
    build:
      context: ./spring-backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PYTHON_SERVICE_URL=http://python-backend:5000
    volumes:
      - ./credentials:/app/credentials
    restart: always

  python-backend:
    build:
      context: ./python-backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/credentials/vertex-ai-key.json
    volumes:
      - ./credentials:/app/credentials
    restart: always
